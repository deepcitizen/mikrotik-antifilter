name: Update MikroTik antifilter repo files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

concurrency:
  group: antifilter-repo-files
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COMMUNITY_URL: https://community.antifilter.download/list/community.lst
      ALLYOUNEED_URL: https://antifilter.download/list/allyouneed.lst
      LIST_NAME: to_vpn
      COMMENT: antifilter
      OUT_DIR: generated

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate .rsc files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          python <<'PY'
          import ipaddress
          import os
          import pathlib
          import urllib.request

          community_url = os.environ["COMMUNITY_URL"]
          allyouneed_url = os.environ["ALLYOUNEED_URL"]
          list_name = os.environ["LIST_NAME"]
          comment = os.environ["COMMENT"]
          out_dir = pathlib.Path(os.environ["OUT_DIR"])
          out_dir.mkdir(parents=True, exist_ok=True)

          def fetch_lines(url: str) -> list[str]:
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "github-actions-antifilter-updater"}
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read().decode("utf-8", errors="replace").splitlines()

          def normalize(lines: list[str]) -> list[str]:
              seen = set()
              result = []

              for raw in lines:
                  line = raw.strip()
                  if not line:
                      continue
                  if line.startswith("#") or line.startswith(";"):
                      continue

                  # отрезаем inline-комментарии, если встретятся
                  for sep in (" #", " ;", "\t#", "\t;"):
                      pos = line.find(sep)
                      if pos != -1:
                          line = line[:pos].strip()

                  if not line:
                      continue

                  try:
                      net = ipaddress.ip_network(line, strict=False)
                  except ValueError:
                      continue

                  cidr = str(net)
                  if cidr not in seen:
                      seen.add(cidr)
                      result.append(cidr)

              def sort_key(value: str):
                  net = ipaddress.ip_network(value, strict=False)
                  return (net.version, int(net.network_address), net.prefixlen)

              result.sort(key=sort_key)
              return result

          def write_rsc(cidrs: list[str], filename: str):
              path = out_dir / filename
              with path.open("w", encoding="utf-8", newline="\n") as f:
                  for cidr in cidrs:
                      f.write(
                          f':do {{ /ip firewall address-list add list={list_name} address={cidr} comment={comment} }} on-error={{}}\n'
                      )

          community = normalize(fetch_lines(community_url))
          allyouneed = normalize(fetch_lines(allyouneed_url))

          write_rsc(community, "community.rsc")
          write_rsc(allyouneed, "allyouneed.rsc")

          (out_dir / "README.txt").write_text(
              "Generated by GitHub Actions.\n"
              f"community entries: {len(community)}\n"
              f"allyouneed entries: {len(allyouneed)}\n",
              encoding="utf-8"
          )
          PY

      - name: Show diff
        shell: bash
        run: |
          set -euo pipefail
          ls -lah "$OUT_DIR"
          echo "----- community.rsc head -----"
          sed -n '1,5p' "$OUT_DIR/community.rsc" || true
          echo "----- allyouneed.rsc head -----"
          sed -n '1,5p' "$OUT_DIR/allyouneed.rsc" || true
          echo "----- git diff -----"
          git diff -- "$OUT_DIR" || true

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUT_DIR/community.rsc" "$OUT_DIR/allyouneed.rsc" "$OUT_DIR/README.txt"

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update antifilter lists"
          git push